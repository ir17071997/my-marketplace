services:
  user-service:
    build: ../services/user-service
    ports:
      - "3001:3000"

  product-service:
    build: ../services/product-service
    ports:
      - "3002:3000"

  store-service:
    build: ../services/store-service
    ports:
      - "3003:3000"

  order-service:
    build: ../services/order-service
    ports:
      - "3004:3000"

  cart-service:
    build: ../services/cart-service
    ports:
      - "3005:3000"

  payment-service:
    build: ../services/payment-service
    ports:
      - "3006:3000"

  review-service:
    build: ../services/review-service
    ports:
      - "3007:3000"

  notification-service:
    build: ../services/notification-service
    ports:
      - "3008:3000"

  search-service:
    build: ../services/search-service
    ports:
      - "3009:3000"

  recommendation-service:
    build: ../services/recommendation-service
    ports:
      - "3010:3000"

  analytics-service:
    build: ../services/analytics-service
    ports:
      - "3011:3000"

  admin-panel-service:
    build: ../services/admin-panel-service
    ports:
      - "3012:3000"

  seller-panel-service:
    build: ../services/seller-panel-service
    ports:
      - "3013:3000"

  web:
    build: ../web
    ports:
      - "3000:3000"

  # TODO: Добавить другие микросервисы моделей...

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata: